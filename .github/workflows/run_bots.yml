name: Run Trading Bots

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours
  workflow_dispatch:          # Manual trigger button

permissions:
  contents: write

jobs:
  run-bots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Full System (10 bots + 3 governors)
        run: python run_all.py

      - name: Commit and push data files
        run: |
          git config user.email "bot@prediction-markets"
          git config user.name "Paper Trader Bot"
          git add \
            trades.json trades.backup.json \
            fade_trades.json fade_trades.backup.json \
            mean_reversion_trades.json mean_reversion_trades.backup.json \
            volume_trades.json volume_trades.backup.json \
            whale_trades.json whale_trades.backup.json \
            contrarian_trades.json contrarian_trades.backup.json \
            close_gravity_trades.json close_gravity_trades.backup.json \
            fresh_sniper_trades.json fresh_sniper_trades.backup.json \
            stability_trades.json stability_trades.backup.json \
            breakout_trades.json breakout_trades.backup.json \
            intelligence_state.json config_overrides.json portfolio.json \
            atlas_state.json meridian_state.json sentinel_state.json \
            2>/dev/null || true
          git diff --cached --quiet && echo 'Nothing to commit' || git commit -m 'chore: update trades + governance state [automated]'
          git push
